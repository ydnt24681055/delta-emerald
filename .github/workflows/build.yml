name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev libelf-dev gcc-arm-none-eabi

      - name: Install agbcc
        run: |
          git clone https://github.com/pret/agbcc
          cd agbcc
          ./build.sh
          ./install.sh ../
          cd ..

      - name: Build ROM
        # COMPARE=0 allows the build to finish without needing a base ROM file
        run: make -j$(nproc) COMPARE=0

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: delta-emerald-rom
          # This catches any .gba file produced by the compiler
          path: "*.gba"
          
