name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev libelf-dev gcc-arm-none-eabi

      - name: Install agbcc
        run: |
          git clone https://github.com/pret/agbcc
          cd agbcc
          ./build.sh
          ./install.sh ../
          cd ..

      - name: Build ROM
        run: make -j$(nproc)

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: delta-emerald-rom
          path: pokemon_emerald.gba
      
   
  
     
      
     
   

 
      
       

    
      
        
        
          
          

      
       
 
     
          

     
        

      
